# Run the Aeron media driver for local dev. Host Rust / Python clients
# connect to /dev/shm/aeron (bind-mounted into the container).
#
# Usage from repo root:
#   docker compose -f docker/aeron/docker-compose.yml up -d
#   docker compose -f docker/aeron/docker-compose.yml logs -f
#   docker compose -f docker/aeron/docker-compose.yml down

services:
  aeron-driver:
    build:
      context: .
    container_name: arbx-aeron-driver
    # Run as the host caller uid so /dev/shm/aeron files are accessible
    # to host-side Rust/Python clients without root. Override with
    # `AERON_UID=$(id -u) AERON_GID=$(id -g) docker compose up -d`.
    user: "${AERON_UID:-1000}:${AERON_GID:-1000}"
    # Share the host's /dev/shm so local Rust/Python processes on the host
    # see the same shared-memory files the driver creates under /dev/shm/aeron.
    # (Mounting the parent /dev/shm — not /dev/shm/aeron — lets Aeron
    # recreate its own subdir cleanly on startup; mounting the subdir
    # itself would turn it into a busy mount point that Aeron can't delete.)
    volumes:
      - /dev/shm:/dev/shm
    # The Media Driver is latency-sensitive; ulimit for locked memory
    # avoids OOM-style page faults on large term buffers.
    ulimits:
      memlock: -1
    restart: unless-stopped
    # No network ports — this is pure IPC (aeron:ipc).
