name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.94.1"

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: |
          rustup toolchain install ${{ env.RUST_VERSION }} --profile minimal --component rustfmt
          rustup default ${{ env.RUST_VERSION }}
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: |
          rustup toolchain install ${{ env.RUST_VERSION }} --profile minimal --component clippy
          rustup default ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  build:
    name: cargo build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: |
          rustup toolchain install ${{ env.RUST_VERSION }} --profile minimal
          rustup default ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --all-targets

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: |
          rustup toolchain install ${{ env.RUST_VERSION }} --profile minimal
          rustup default ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all
