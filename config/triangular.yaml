# Triangular arbitrage: A→B→C→A within a single venue.
# Requires feat/triangular-arb-strategy merged and strategy.name dispatch wired.
#
# Example cycle: USDT → BTC → ETH → USDT on Binance spot
#   leg_a: buy BTC with USDT  (BTCUSDT, side=buy)
#   leg_b: buy ETH with BTC   (ETHBTC,  side=buy)
#   leg_c: sell ETH for USDT  (ETHUSDT, side=sell)

venues:
  - name: binance
    market: spot
    api_key: "${BINANCE_API_KEY}"
    api_secret: "${BINANCE_API_SECRET}"
    paper_trading: true
    fee_taker_override: "0.0001"
    fee_maker_override: "0.00005"

strategy:
  name: triangular_arb
  # instrument_a/b retained for schema compat; triangle legs are defined in code
  instrument_a:
    base: BTC
    quote: USDT
    instrument_type: spot
  instrument_b:
    base: ETH
    quote: BTC
    instrument_type: spot
  min_net_profit_bps: "2"
  max_quantity: "0.01"      # max notional leg size in base currency of leg_a
  max_quote_age_ms: 2000    # tighter staleness window for 3-leg synchrony
  tick_size_a: "0.01"
  tick_size_b: "0.00001"
  lot_size_a: "0.00001"
  lot_size_b: "0.00001"
  max_book_depth: 5

risk:
  max_position_size: "0.5"
  max_daily_loss: "500"
  max_notional_exposure: "50000"
  circuit_breaker:
    max_drawdown: "250"
    max_orders_per_minute: 60
    max_consecutive_failures: 3

engine:
  reconcile_interval_secs: 30

logging:
  level: info
  json_output: false
  log_file: null
