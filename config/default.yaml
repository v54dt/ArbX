venues:
  - name: binance
    market: usdt_futures
    instruments:
      - { base: BTC, quote: USDT, instrument_type: swap }
      - { base: ETH, quote: USDT, instrument_type: swap }
      - { base: SOL, quote: USDT, instrument_type: swap }
    api_key: ""
    api_secret: ""
    paper_trading: true
    fee_taker_override: "0.0001"
    fee_maker_override: "0.00005"
  - name: binance
    market: spot
    instruments:
      - { base: BTC, quote: USDT, instrument_type: spot }
      - { base: ETH, quote: USDT, instrument_type: spot }
      - { base: SOL, quote: USDT, instrument_type: spot }
    api_key: ""
    api_secret: ""
    paper_trading: true
    fee_taker_override: "0.0001"
    fee_maker_override: "0.00005"

strategy:
  name: cross_exchange
  # instrument_a is paired with venues[0] (binance usdt_futures) → swap.
  # instrument_b is paired with venues[1] (binance spot) → spot.
  # Mismatching the instrument_type with the venue's market silently mis-labels
  # books in the engine's BookMap (e.g. swap-stream data filed under :spot).
  instrument_a:
    base: BTC
    quote: USDT
    instrument_type: swap
    settle_currency: USDT
  instrument_b:
    base: BTC
    quote: USDT
    instrument_type: spot
  min_net_profit_bps: "1"
  max_quantity: "0.01"
  max_quote_age_ms: 5000
  tick_size_a: "0.01"
  tick_size_b: "0.01"
  lot_size_a: "0.00001"
  lot_size_b: "0.00001"
  max_book_depth: 10

risk:
  max_position_size: "1"
  max_daily_loss: "1000"
  max_notional_exposure: "100000"
  circuit_breaker:
    max_drawdown: "500"
    max_orders_per_minute: 100
    max_consecutive_failures: 5

engine:
  reconcile_interval_secs: 30

logging:
  level: info
  json_output: false
  log_file: null
