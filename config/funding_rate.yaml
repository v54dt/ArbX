venues:
  - name: binance
    market: usdt_futures
    instruments:
      - { base: BTC, quote: USDT, instrument_type: swap }
      - { base: ETH, quote: USDT, instrument_type: swap }
      - { base: SOL, quote: USDT, instrument_type: swap }
    api_key: ""
    api_secret: ""
    paper_trading: true
    fee_taker_override: "0.0004"
    fee_maker_override: "0.0002"
  - name: binance
    market: spot
    instruments:
      - { base: BTC, quote: USDT, instrument_type: spot }
      - { base: ETH, quote: USDT, instrument_type: spot }
      - { base: SOL, quote: USDT, instrument_type: spot }
    api_key: ""
    api_secret: ""
    paper_trading: true
    fee_taker_override: "0.001"
    fee_maker_override: "0.001"

strategy:
  name: funding_rate
  instrument_a:
    base: BTC
    quote: USDT
    instrument_type: spot
  instrument_b:
    base: BTC
    quote: USDT
    instrument_type: swap
    settle_currency: USDT
  min_net_profit_bps: "50"
  max_quantity: "0.1"
  max_quote_age_ms: 5000

risk:
  max_position_size: "1"
  max_daily_loss: "500"
  max_notional_exposure: "50000"
  circuit_breaker:
    max_drawdown: "250"
    max_orders_per_minute: 20
    max_consecutive_failures: 3

engine:
  reconcile_interval_secs: 30

logging:
  level: info
  json_output: false
  log_file: null
