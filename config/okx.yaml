venues:
  - name: okx
    market: swap
    api_key: "${OKX_API_KEY}"
    api_secret: "${OKX_API_SECRET}"
    paper_trading: true
  - name: okx
    market: spot
    api_key: "${OKX_API_KEY}"
    api_secret: "${OKX_API_SECRET}"
    paper_trading: true

strategy:
  name: cross_exchange
  instrument_a:
    base: BTC
    quote: USDT
    instrument_type: spot
  instrument_b:
    base: BTC
    quote: USDT
    instrument_type: swap
    settle_currency: USDT
  min_net_profit_bps: "1"
  max_quantity: "0.01"
  max_quote_age_ms: 5000
  max_book_depth: 10

risk:
  max_position_size: "1"
  max_daily_loss: "1000"
  max_notional_exposure: "100000"
  circuit_breaker:
    max_drawdown: "500"
    max_orders_per_minute: 100
    max_consecutive_failures: 5

engine:
  reconcile_interval_secs: 30

logging:
  level: info
  json_output: false
